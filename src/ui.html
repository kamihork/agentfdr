<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>agentfdr — flight recorder</title>
<style>
  :root {
    --page: #f9f9f7;
    --surface-1: #fcfcfb;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11, 11, 11, 0.10);
    /* tool lane (categorical, fixed order — never cycled) */
    --tool-shell: #2a78d6;
    --tool-write: #1baf7a;
    --tool-read: #eda100;
    --tool-search: #008300;
    --tool-agent: #4a3aa7;
    --tool-web: #e87ba4;
    --tool-mcp: #eb6834;
    --tool-other: #898781;
    /* context ramp (one hue, ordinal light->dark) */
    --ctx-1: #86b6ef;
    --ctx-2: #2a78d6;
    --ctx-3: #104281;
    /* output tokens (second sequential context -> aqua) */
    --out: #1baf7a;
    /* status — reserved, never reused for series */
    --status-critical: #d03b3b;
    --status-warning: #fab219;
    --wash: rgba(11, 11, 11, 0.05);
    --select: rgba(42, 120, 214, 0.14);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page: #0d0d0d;
      --surface-1: #1a1a19;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255, 255, 255, 0.10);
      --tool-shell: #3987e5;
      --tool-write: #199e70;
      --tool-read: #c98500;
      --tool-search: #008300;
      --tool-agent: #9085e9;
      --tool-web: #d55181;
      --tool-mcp: #d95926;
      --tool-other: #898781;
      --ctx-1: #86b6ef;
      --ctx-2: #3987e5;
      --ctx-3: #184f95;
      --out: #199e70;
      --wash: rgba(255, 255, 255, 0.07);
      --select: rgba(57, 135, 229, 0.20);
    }
  }
  :root[data-theme="light"] {
    --page: #f9f9f7; --surface-1: #fcfcfb; --text-primary: #0b0b0b; --text-secondary: #52514e;
    --text-muted: #898781; --grid: #e1e0d9; --baseline: #c3c2b7; --border: rgba(11,11,11,0.10);
    --tool-shell: #2a78d6; --tool-write: #1baf7a; --tool-read: #eda100; --tool-search: #008300;
    --tool-agent: #4a3aa7; --tool-web: #e87ba4; --tool-mcp: #eb6834; --tool-other: #898781;
    --ctx-1: #86b6ef; --ctx-2: #2a78d6; --ctx-3: #104281; --out: #1baf7a;
    --wash: rgba(11,11,11,0.05); --select: rgba(42,120,214,0.14);
  }
  :root[data-theme="dark"] {
    --page: #0d0d0d; --surface-1: #1a1a19; --text-primary: #ffffff; --text-secondary: #c3c2b7;
    --text-muted: #898781; --grid: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
    --tool-shell: #3987e5; --tool-write: #199e70; --tool-read: #c98500; --tool-search: #008300;
    --tool-agent: #9085e9; --tool-web: #d55181; --tool-mcp: #d95926; --tool-other: #898781;
    --ctx-1: #86b6ef; --ctx-2: #3987e5; --ctx-3: #184f95; --out: #199e70;
    --wash: rgba(255,255,255,0.07); --select: rgba(57,135,229,0.20);
  }

  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--page);
    color: var(--text-primary);
    font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 12px 16px 16px;
    max-width: 1400px;
    margin: 0 auto;
  }
  header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
  header h1 { font-size: 17px; font-weight: 650; letter-spacing: -0.01em; }
  header h1 span { color: var(--text-muted); font-weight: 400; }
  select, button {
    font: inherit; color: var(--text-primary);
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 10px; cursor: pointer;
  }
  select { max-width: 480px; }
  button:hover { background: var(--wash); }
  .spacer { flex: 1; }
  #liveToggle.on {
    color: #fff; background: var(--status-critical); border-color: var(--status-critical);
    font-weight: 600;
  }
  #metabar { display: flex; gap: 16px; align-items: baseline; flex-wrap: wrap; margin-bottom: 8px; }
  #meta { color: var(--text-secondary); font-size: 12.5px; flex: 1; min-width: 300px; }
  #meta .livebadge { color: var(--status-critical); font-weight: 650; }
  #errbar {
    background: var(--surface-1); border: 1px solid var(--status-critical); border-radius: 10px;
    color: var(--status-critical); padding: 10px 14px; margin-bottom: 14px; font-size: 13px;
  }
  #hint { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
  #hint kbd {
    font: 11px ui-monospace, monospace; border: 1px solid var(--border); border-bottom-width: 2px;
    border-radius: 4px; padding: 0 4px; margin: 0 1px;
  }

  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 8px; }
  .tile {
    position: relative; overflow: hidden;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 9px;
    padding: 7px 12px 9px;
  }
  .tile .label { font-size: 11.5px; color: var(--text-secondary); }
  .tile .value { font-size: 19px; font-weight: 650; font-variant-numeric: tabular-nums; }
  .tile .value.ok { color: var(--out); }
  .tile .value.warn { color: var(--status-warning); }
  .tile .value.crit { color: var(--status-critical); }
  .tile .sub { font-size: 11.5px; color: var(--text-muted); position: relative; }
  .tile .sub.bad { color: var(--status-critical); }
  .tile svg.spark {
    position: absolute; left: 0; right: 0; bottom: 0; width: 100%; height: 26px;
    display: block; pointer-events: none;
  }
  .tile .gauge { height: 5px; border-radius: 3px; background: var(--wash); margin-top: 5px; overflow: hidden; }
  .tile .gauge > div { height: 100%; border-radius: 3px; }

  #flagstrip { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .flagchip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 999px; padding: 2px 10px; font-size: 12px; cursor: pointer;
  }
  .flagchip:hover { background: var(--wash); }
  .flagchip.active { outline: 2px solid var(--ctx-2); }
  .flagchip .ico { font-size: 11px; }
  .flagchip.critical .ico { color: var(--status-critical); }
  .flagchip.warning .ico { color: var(--status-warning); }
  .flagchip .range { color: var(--text-muted); }

  .card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px 12px; margin-bottom: 10px; }
  .card h2 { font-size: 12.5px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }

  /* Tab bar: exactly one main view visible at a time */
  #tabs { display: flex; gap: 2px; margin-bottom: 8px; border-bottom: 1px solid var(--grid); }
  #tabs button {
    background: none; border: none; border-bottom: 2px solid transparent; border-radius: 0;
    padding: 4px 12px 6px; color: var(--text-secondary); cursor: pointer; font-size: 13px;
  }
  #tabs button:hover { color: var(--text-primary); background: var(--wash); }
  #tabs button.active { color: var(--text-primary); border-bottom-color: var(--ctx-2); font-weight: 600; }
  #tabs .count { color: var(--text-muted); font-size: 11px; margin-left: 4px; }

  /* Turn dissection: right side panel. Always visible on wide screens (empty
     state when nothing is selected); slides in as an overlay on narrow ones.
     Width is user-resizable via the left-edge grip (persisted). */
  :root { --drawer-w: 540px; }
  #detail {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 20;
    width: min(var(--drawer-w), 94vw);
    background: var(--surface-1); border-left: 1px solid var(--border);
    box-shadow: -10px 0 32px rgba(0, 0, 0, 0.22);
    transform: translateX(105%); visibility: hidden;
    transition: transform 0.16s ease, visibility 0.16s;
  }
  #detailBody { height: 100%; overflow-y: auto; padding: 12px 16px 16px; }
  #drawerGrip {
    position: absolute; left: 0; top: 0; bottom: 0; width: 7px; z-index: 3;
    cursor: col-resize; touch-action: none;
  }
  #drawerGrip:hover, #drawerGrip.dragging { background: var(--select); }
  body.resizing { cursor: col-resize; user-select: none; }
  body.resizing #detail { transition: none; }
  .dempty { color: var(--text-muted); font-size: 12.5px; text-align: center; padding: 40px 12px; }
  @media (min-width: 1200px) {
    #detail { transform: none; visibility: visible; }
    /* Two-pane layout: main content flows up to the panel edge — no centered
       max-width, otherwise a fixed gap opens between content and panel. */
    body { max-width: none; padding-right: calc(min(var(--drawer-w), 94vw) + 20px); }
  }
  @media (max-width: 1199.98px) {
    #detail.open { transform: translateX(0); visibility: visible; }
  }
  .lanes { overflow-x: auto; }
  #legend > .legend { margin-top: 5px; }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; align-items: baseline; font-size: 12px; color: var(--text-secondary); }
  .legend .key { display: inline-flex; align-items: center; gap: 6px; }
  .legend .swatch { width: 10px; height: 10px; border-radius: 3px; }
  .legend button.key {
    background: none; border: 1px solid transparent; border-radius: 6px;
    padding: 2px 7px; color: inherit; font: inherit; cursor: pointer;
  }
  .legend button.key:hover { background: var(--wash); }
  .legend button.key.active { border-color: var(--ctx-2); background: var(--select); }
  .legend button.key.dimmed { opacity: 0.4; }
  .legend .hint { color: var(--text-muted); font-size: 10.5px; }

  #promptsList { list-style: none; margin: 0; padding: 0; }
  #promptsList li {
    display: flex; gap: 10px; align-items: baseline; padding: 6px 0;
    border-bottom: 1px solid var(--grid); font-size: 12.5px;
  }
  #promptsList li:last-child { border-bottom: none; }
  #promptsList button {
    flex: none; font-size: 11.5px; padding: 1px 8px;
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  #promptsList .ptext { color: var(--text-secondary); white-space: pre-wrap; word-break: break-word; }
  #promptsList .pqueued {
    flex: none; font-size: 10.5px; color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 999px; padding: 0 7px;
  }

  .urow { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; font-size: 12.5px; margin: 3px 0; }
  .ulabel { min-width: 190px; color: var(--text-secondary); }
  .uval { font-weight: 600; font-variant-numeric: tabular-nums; }
  .upct { color: var(--text-muted); font-variant-numeric: tabular-nums; }
  #diffBody h3 { font-size: 12px; color: var(--text-muted); font-weight: 600; margin: 14px 0 4px; letter-spacing: 0.04em; }
  #diffBody td.better { color: var(--tool-write); font-weight: 600; }
  #diffBody td.worse { color: var(--status-critical); font-weight: 600; }
  #diffBody .fpath { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--text-secondary); }
  .ubar { flex: 1; min-width: 100px; max-width: 260px; height: 8px; border-radius: 4px; background: var(--wash); overflow: hidden; }
  .ubar > div { height: 100%; border-radius: 4px; background: var(--ctx-2); }
  .ubar.hot > div { background: var(--status-warning); }
  .ubar.over > div { background: var(--status-critical); }
  #usageBody .unote { color: var(--text-muted); font-size: 11px; margin-top: 6px; }
  #usageBody input {
    width: 64px; font: inherit; font-size: 12px; background: var(--page); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: 6px; padding: 1px 6px;
  }

  #tooltip {
    position: fixed; z-index: 10; pointer-events: none; display: none;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.18); padding: 10px 12px; font-size: 12.5px;
    max-width: 360px;
  }
  #tooltip .tt-title { font-weight: 600; margin-bottom: 6px; }
  #tooltip .row { display: flex; align-items: baseline; gap: 8px; }
  #tooltip .row .k { width: 14px; height: 3px; border-radius: 2px; flex: none; align-self: center; }
  #tooltip .row .v { font-weight: 600; }
  #tooltip .row .l { color: var(--text-secondary); }
  #tooltip .prompt { color: var(--text-secondary); border-top: 1px solid var(--grid); margin-top: 6px; padding-top: 6px; }
  #tooltip .flagline.critical { color: var(--status-critical); }
  #tooltip .flagline.warning { color: var(--status-warning); }

  #detail .head {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    position: sticky; top: -12px; z-index: 2;
    background: var(--surface-1); padding: 12px 0 8px; margin: -12px 0 8px;
  }
  #detail .head .t { font-size: 15px; font-weight: 650; }
  #detail .head .m { color: var(--text-muted); font-size: 12.5px; }
  #detail .head button { padding: 2px 10px; font-size: 12.5px; }
  #detail .atext {
    white-space: pre-wrap; color: var(--text-secondary); font-size: 13px;
    border-left: 2px solid var(--grid); padding-left: 10px; margin: 8px 0; max-height: 150px; overflow-y: auto;
  }
  table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  th { text-align: left; color: var(--text-muted); font-weight: 500; padding: 4px 10px 4px 0; border-bottom: 1px solid var(--grid); }
  td { padding: 5px 10px 5px 0; border-bottom: 1px solid var(--grid); vertical-align: top; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .toolkey { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 6px; vertical-align: baseline; }
  .err { color: var(--status-critical); font-weight: 600; }
  details summary { cursor: pointer; color: var(--text-muted); }
  details pre {
    white-space: pre-wrap; word-break: break-word; font-size: 11.5px; color: var(--text-secondary);
    background: var(--wash); border-radius: 6px; padding: 8px; margin-top: 6px; max-height: 240px; overflow-y: auto;
  }
  #empty { color: var(--text-secondary); padding: 40px; text-align: center; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <header>
    <h1>agentfdr <span data-i18n="subtitle">/ flight recorder</span></h1>
    <select id="sessionSelect" aria-label="Session"></select>
    <div class="spacer"></div>
    <button id="liveToggle" aria-pressed="false"></button>
    <button id="copyReport"></button>
    <button id="langToggle" title="Language / 言語"></button>
    <button id="themeToggle" title="Theme">◐</button>
  </header>
  <div id="metabar">
    <div id="meta"></div>
    <div id="hint"></div>
  </div>
  <div id="errbar" class="hidden"></div>
  <div id="empty" class="hidden"></div>

  <div id="deck" class="hidden">
    <div class="tiles" id="tiles"></div>
    <div id="flagstrip"></div>

    <nav id="tabs" role="tablist">
      <button data-tab="timeline" role="tab"></button>
      <button data-tab="table" role="tab"></button>
      <button data-tab="prompts" role="tab"></button>
      <button data-tab="usage" role="tab"></button>
      <button data-tab="diff" role="tab"></button>
    </nav>

    <div class="card" id="timelineCard" data-panel="timeline">
      <h2 id="tlTitle"></h2>
      <div class="lanes" id="lanes"></div>
      <div id="legend"></div>
    </div>

    <div class="card hidden" id="tableCard" data-panel="table">
      <h2 id="tableTitle"></h2>
      <div style="overflow-x:auto"><table id="turnsTable"></table></div>
    </div>

    <div class="card hidden" id="promptsCard" data-panel="prompts">
      <h2 id="promptsTitle"></h2>
      <ol id="promptsList"></ol>
    </div>

    <div class="card hidden" id="usageCard" data-panel="usage">
      <h2 id="usageTitle"></h2>
      <div id="usageBody"></div>
    </div>

    <div class="card hidden" id="diffCard" data-panel="diff">
      <h2 id="diffTitle"></h2>
      <div class="urow" style="margin-bottom:8px">
        <span id="diffPickLabel" class="ulabel" style="min-width:auto"></span>
        <select id="diffSelect" style="max-width:480px"></select>
      </div>
      <div id="diffBody"></div>
    </div>
  </div>

  <aside id="detail" aria-label="Turn detail">
    <div id="drawerGrip" role="separator" aria-orientation="vertical" title="drag to resize"></div>
    <div id="detailBody"></div>
  </aside>

  <div id="tooltip" role="status"></div>

<script>
'use strict';

// ---------- i18n ----------
const I18N = {
  en: {
    subtitle: '/ flight recorder',
    tableView: 'Table view',
    promptsView: 'Prompts',
    promptsTitle: (n) => `Prompts — ${n}`,
    copyReport: 'Copy report',
    copied: '✓ Copied',
    queuedBadge: 'sent mid-turn',
    live: '● LIVE',
    liveTitle: 'Auto-refresh while the session is running',
    liveBadge: (t) => `● LIVE · updated ${t}`,
    loadError: (m) => `Failed to load session: ${m}`,
    legendHint: '(click to filter)',
    effortBit: (v) => `effort ${v}`,
    tabTimeline: 'Timeline',
    tabDiff: 'Compare',
    diffTitle: 'Session comparison — A is the current session',
    d: {
      pick: 'Compare with (B):', choose: '— choose a session —',
      metric: 'metric', turns: 'turns', prompts: 'prompts', calls: 'tool calls', errors: 'tool errors',
      wall: 'wall time', out: 'output tokens', billed: 'billed tokens', peak: 'context peak',
      cost: 'est. cost', anomalies: 'anomalies', critical: 'critical',
      flagsH: 'ANOMALIES BY TYPE', toolsH: 'TOOL CALLS BY TOOL', filesH: 'EDITED FILES',
      both: 'edited in both', onlyA: 'only in A', onlyB: 'only in B', more: (n) => `… +${n} more`,
      loadError: (m) => `Failed to load diff: ${m}`,
    },
    usageView: 'Usage',
    usageTitle: 'Plan usage — all projects',
    u: {
      plan: 'plan', window: 'current 5h window', noWindow: 'no active 5h window',
      today: 'today', week: 'last 7 days', windows: (n) => `${n} windows`,
      b5: '5h budget', bw: 'weekly budget', m: 'M tok',
      calib: 'Exact plan limits are not published — calibrate budgets against /usage in Claude Code. Billed tokens = fresh input + cache write + output.',
      byModel: 'by model', turns: (n) => `${n} turns`,
      unknown: (m) => `Cost excludes unpriced model(s): ${m}`,
    },
    timeline: (n) => `Timeline — ${n} turns`,
    turnsTable: 'Turns',
    empty: 'No sessions found under ~/.claude/projects.',
    hint: 'click a turn to dissect · <kbd>←</kbd><kbd>→</kbd> move · <kbd>Esc</kbd> close',
    tiles: { turns: 'Turns', calls: 'Tool calls', out: 'Output tokens', peak: 'Context peak', cache: 'Cache hit rate', cost: 'Est. cost', flags: 'Anomalies' },
    subs: {
      prompts: (n) => `${n} prompts`, errors: (n) => `${n} errors`, noErrors: 'no errors',
      fresh: (k) => `in ${k} fresh`, cacheTotal: (k) => `cache-read ${k} total`,
      critical: (n) => `${n} critical`, noneCritical: 'none critical',
      estimate: 'list-price estimate', partialEstimate: 'partial — unknown model',
      cacheIo: (r, w) => `read ${r} · write ${w}`,
    },
    lanes: { tools: 'TOOLS', ctx: 'CONTEXT TOKENS', out: 'OUTPUT TOKENS' },
    legendGroups: { tools: 'TOOLS', tokens: 'TOKENS' },
    toolGroups: { shell: 'Shell', write: 'Edit/Write', read: 'Read', search: 'Search', agent: 'Subagent', web: 'Web', mcp: 'MCP', other: 'Other' },
    tokenKeys: { cacheRead: 'cache read', cacheWrite: 'cache write', fresh: 'fresh input', out: 'output' },
    tt: {
      turn: (i) => `Turn ${i}`, subagent: 'subagent', context: (c) => `context (${c} cached)`,
      outTokens: 'output tokens', stop: (r) => `stop: ${r}`, more: (n) => `… +${n} more calls`,
      error: '⚠ error', prompt: '▼ prompt: ',
    },
    detail: {
      turn: (i) => `Turn ${i}`, subagent: 'subagent sidechain', stop: (r) => `stop: ${r}`,
      usage: { input: 'fresh input', cacheRead: 'cache read', cacheWrite: 'cache write', out: 'output', thinking: 'thinking chars' },
      cols: ['tool', 'input', 'duration', 'result'], chars: 'chars', snippet: 'snippet',
      noResult: '(no result recorded)', error: 'ERROR ', prev: '‹ prev', next: 'next ›', close: '✕',
      empty: 'Click a turn on the timeline (or an anomaly chip) and its dissection appears here. ←/→ steps between turns.',
    },
    tableCols: ['turn', 'time', 'tools', 'context', 'output', 'errors', 'flags'],
    compact: '⟲ compact',
    flags: {
      'loop': (p) => `Tool loop ×${p.repeats}`,
      'error-streak': (p) => `${p.count} consecutive tool errors`,
      'context-bloat': (p) => `Huge tool result (${p.kchars}k chars)`,
      'token-spike': (p) => `Context +${p.deltaK}k in one turn`,
      'cache-thrash': (p) => `${p.count} turns with zero cache hits`,
      'file-churn': (p) => `Same file edited ${p.count}×`,
      'refusal': () => 'Model refusal',
    },
    flagDetails: {
      'loop': (p) => `Repeated ${p.repeats}× (${p.span} calls): ${p.gram}`,
      'error-streak': (p) => `Starting with ${p.firstSig}`,
      'context-bloat': (p) => `${p.name}: ${p.summary}`,
      'token-spike': (p) => `${p.fromK}k → ${p.toK}k`,
      'cache-thrash': () => 'Full input re-read each turn',
      'file-churn': (p) => p.path,
      'refusal': () => 'stop_reason: refusal — the request was declined',
    },
  },
  ja: {
    subtitle: '/ フライトレコーダー',
    tableView: 'テーブル表示',
    promptsView: 'プロンプト',
    promptsTitle: (n) => `プロンプト一覧 — ${n}件`,

// ---------- state ----------
let MODEL = null;
let selectedTurn = null;
let TL = null; // geometry of the current timeline render, for the selection overlay
let LIVE = false;       // auto-refresh (watch mode)
let MTIME = null;       // transcript mtime of the currently rendered model
let SIZE = null;        // transcript size — mtime alone can miss same-granule appends
let pollTimer = null;
let USAGE = null;       // /api/usage payload (fetched when the tab opens)
let DIFF = null;        // /api/diff payload for the current A/B pair

/** Drag the panel's left edge to resize; width persists across sessions. */
function initDrawerResize() {
  const grip = $('drawerGrip');
  const clamp = (w) => Math.round(Math.min(Math.max(w, 360), Math.min(900, window.innerWidth * 0.7)));
  const saved = Number(localStorage.getItem('agentfdr.drawerW'));
  if (saved >= 360) document.documentElement.style.setProperty('--drawer-w', clamp(saved) + 'px');

  // Listen on window (not the grip): drags outrun a 7px-wide element instantly,
  // and pointer capture is unreliable for synthetic input.
  grip.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    grip.classList.add('dragging');
    document.body.classList.add('resizing');
    let width = null;
    const move = (ev) => {
      width = clamp(window.innerWidth - ev.clientX);
      document.documentElement.style.setProperty('--drawer-w', width + 'px');
    };
    const up = (ev) => {
      if (ev.clientX != null) move(ev);
      grip.classList.remove('dragging');
      document.body.classList.remove('resizing');
      if (width != null) localStorage.setItem('agentfdr.drawerW', String(width));
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      window.removeEventListener('pointercancel', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    window.addEventListener('pointercancel', up);
  });
}

/** One main view at a time: timeline | table | prompts | usage. */
function switchTab(name) {
  TAB = name;
  localStorage.setItem('agentfdr.tab', name);
  for (const btn of document.querySelectorAll('#tabs button')) {
    btn.classList.toggle('active', btn.dataset.tab === name);
    btn.setAttribute('aria-selected', String(btn.dataset.tab === name));
  }
  for (const panel of document.querySelectorAll('[data-panel]')) {
    panel.classList.toggle('hidden', panel.dataset.panel !== name);
  }
  if (name === 'usage') loadUsage(); // refresh on every open — it's cheap (server caches)
  if (name === 'diff') renderDiffPicker();
}

const $ = (id) => document.getElementById(id);
const css = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

// Fixed tool-group order — identity follows the tool, never its rank.
const TOOL_GROUPS = [
  ['shell',  (n) => /^(Bash|BashOutput|KillShell)$/.test(n)],
  ['write',  (n) => /^(Edit|Write|MultiEdit|NotebookEdit)$/.test(n)],
  ['read',   (n) => n === 'Read'],
  ['search', (n) => /^(Grep|Glob|LS)$/.test(n)],
  ['agent',  (n) => /^(Task|Agent|Skill|Workflow|SendMessage)$/.test(n)],
  ['web',    (n) => /^(WebFetch|WebSearch)$/.test(n)],
  ['mcp',    (n) => n.startsWith('mcp__')],
];
function toolGroup(name) {
  for (const [g, test] of TOOL_GROUPS) if (test(name)) return g;
  return 'other';
}
const groupColor = (g) => css('--tool-' + g);

const kTok = (n) => n >= 1000 ? (n >= 100000 ? Math.round(n / 1000) + 'k' : (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k') : String(n);
const fmtMs = (ms) => {
  if (ms == null) return '?';
  const s = Math.round(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  return m < 60 ? m + 'm ' + (s % 60) + 's' : Math.floor(m / 60) + 'h ' + (m % 60) + 'm';
};
const hhmm = (ts) => ts ? new Date(ts).toTimeString().slice(0, 8) : '';
const fmtUsd = (u) => u == null ? '?' : u >= 100 ? '$' + Math.round(u) : u >= 1 ? '$' + u.toFixed(2) : '$' + u.toFixed(3);

// ---------- boot ----------
init();
async function init() {
  const savedTheme = localStorage.getItem('agentfdr.theme');
  if (savedTheme) document.documentElement.dataset.theme = savedTheme;

  // Deep-linkable view state: ?theme=dark&uilang=en&tab=usage&sel=95
  // (lets you share/reproduce an exact view; also used for screenshots)
  const qp = new URLSearchParams(location.search);
  if (qp.get('theme') === 'dark' || qp.get('theme') === 'light') {
    document.documentElement.dataset.theme = qp.get('theme');
  }
  if (qp.get('uilang') === 'en' || qp.get('uilang') === 'ja') LANG = qp.get('uilang');
  if (['timeline', 'table', 'prompts', 'usage', 'diff'].includes(qp.get('tab'))) TAB = qp.get('tab');

  $('themeToggle').addEventListener('click', () => {
    const root = document.documentElement;
    const dark = matchMedia('(prefers-color-scheme: dark)').matches;
    const cur = root.dataset.theme || (dark ? 'dark' : 'light');
    root.dataset.theme = cur === 'dark' ? 'light' : 'dark';
    localStorage.setItem('agentfdr.theme', root.dataset.theme);
    if (MODEL) render();
  });
  $('langToggle').addEventListener('click', () => {
    LANG = LANG === 'ja' ? 'en' : 'ja';
    localStorage.setItem('agentfdr.lang', LANG);
    applyChrome();
    if (MODEL) render();
    if (USAGE) renderUsage();
    if (DIFF) renderDiff();
  });
  for (const btn of document.querySelectorAll('#tabs button')) {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  }
  initDrawerResize();
  $('liveToggle').addEventListener('click', () => setLive(!LIVE));
  $('copyReport').addEventListener('click', copyReport);
  // Catch up immediately when the tab becomes visible again (polling pauses while hidden).
  document.addEventListener('visibilitychange', () => { if (!document.hidden && LIVE) poll(); });

  document.addEventListener('keydown', (e) => {
    if (!MODEL || /^(SELECT|INPUT|TEXTAREA)$/.test(e.target.tagName)) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
      e.preventDefault();
      const delta = e.key === 'ArrowRight' ? 1 : -1;
      const max = MODEL.turns.length - 1;
      selectedTurn = selectedTurn == null ? (delta > 0 ? 0 : max) : Math.max(0, Math.min(max, selectedTurn + delta));
      renderDetail();
      updateSelection();
      scrollToTurn(selectedTurn);
    } else if (e.key === 'Escape') {
      selectedTurn = null;
      renderDetail();
      updateSelection();
    }
  });

  applyChrome();
  switchTab(TAB);

  const res = await fetch('/api/sessions');
  const { projects } = await res.json();
  const sel = $('sessionSelect');
  for (const p of projects) {
    const og = document.createElement('optgroup');
    og.label = p.slug.replace(/^-/, '').replace(/-/g, '/');
    for (const s of p.sessions) {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = (s.title || s.id.slice(0, 8)) + ' — ' + new Date(s.mtimeMs).toLocaleString();
      og.appendChild(opt);
      SESSIONLIST.push({ id: s.id, title: s.title, mtimeMs: s.mtimeMs });
    }
    sel.appendChild(og);
  }
  sel.addEventListener('change', () => load(sel.value));
  $('diffSelect').addEventListener('change', loadDiff);

  if (!projects.length) { $('empty').classList.remove('hidden'); return; }
  const want = location.hash.slice(1);
  const first = want && [...sel.options].some((o) => o.value === want) ? want : sel.options[0].value;
  sel.value = first;
  await load(first);
  // `agentfdr watch` opens the viewer with ?live=1
  if (qp.get('live') === '1') setLive(true);
  const selTurn = qp.get('sel') === null ? NaN : Number(qp.get('sel'));
  if (Number.isInteger(selTurn) && MODEL && MODEL.turns[selTurn]) {
    selectedTurn = selTurn;
    renderDetail();
    updateSelection();
    scrollToTurn(selTurn);
  }
}

function setLive(on) {
  LIVE = on;
  $('liveToggle').classList.toggle('on', on);
  $('liveToggle').setAttribute('aria-pressed', String(on));
  clearInterval(pollTimer);
  if (on) pollTimer = setInterval(poll, 2000);
  if (MODEL) renderMeta();
}

/** Live-mode tick: cheap mtime+size probe; re-render only when the transcript grew. */
async function poll(force = false) {
  const id = $('sessionSelect').value;
  if (!id || (document.hidden && !force)) return; // paused while the tab is hidden
  try {
    const probe = MTIME != null && SIZE != null ? '&since=' + MTIME + '&sz=' + SIZE : '';
    const res = await fetch('/api/session?id=' + encodeURIComponent(id) + probe);
    if (!res.ok) return;
    const data = await res.json();
    if (data.error || data.unchanged) return;
    // The user may have switched sessions while this request was in flight —
    // applying a stale payload would show session A under session B's name.
    if ($('sessionSelect').value !== id) return;
    MTIME = data.mtimeMs ?? null;
    SIZE = data.sizeBytes ?? null;
    const followTail = selectedTurn == null || selectedTurn === MODEL.turns.length - 1;
    MODEL = data;
    if (selectedTurn != null) {
      selectedTurn = followTail ? MODEL.turns.length - 1 : Math.min(selectedTurn, MODEL.turns.length - 1);
    }
    render();
    if (followTail && MODEL.turns.length) scrollToTurn(MODEL.turns.length - 1);
  } catch {
    // transient (server restarting, fs race) — next tick retries
  }
}

// ---------- plan usage (all projects) ----------
const kM = (n) => n >= 1_000_000 ? (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M' : n >= 1000 ? Math.round(n / 1000) + 'k' : String(n);
const budgetM = (key) => {
  const v = Number(localStorage.getItem('agentfdr.' + key));
  return Number.isFinite(v) && v > 0 ? v * 1_000_000 : null;
};

async function loadUsage() {
  $('usageBody').textContent = '…';
  try {
    const res = await fetch('/api/usage');
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'HTTP ' + res.status);
    USAGE = data;
  } catch (err) {
    $('usageBody').textContent = T().loadError(err.message || String(err));
    return;
  }
  renderUsage();
}

function renderUsage() {
  const L = T().u;
  $('usageTitle').textContent = T().usageTitle;
  const body = $('usageBody');
  body.textContent = '';
  const b5 = budgetM('b5M') ?? USAGE.budgets?.fiveHour ?? null;
  const bw = budgetM('bwM') ?? USAGE.budgets?.week ?? null;

  const row = (label, valueText, billed, budget) => {
    const r = add(body, 'div', 'urow');
    add(r, 'span', 'ulabel', label);
    add(r, 'span', 'uval', valueText);
    if (budget && billed != null) {
      const pct = Math.round((billed / budget) * 100);
      const bar = add(r, 'div', 'ubar' + (pct >= 100 ? ' over' : pct >= 80 ? ' hot' : ''));
      const fill = add(bar, 'div', '');
      fill.style.width = Math.min(100, pct) + '%';
      add(r, 'span', 'upct', pct + '% / ' + kM(budget));
    }
    return r;
  };
  const fmtBucket = (b) => kM(b.billed) + ' tok · ~' + fmtUsd(b.usd);
  const hm = (ts) => new Date(ts).toTimeString().slice(0, 5);

  if (USAGE.plan && (USAGE.plan.organizationType || USAGE.plan.rateLimitTier)) {
    row(L.plan, [USAGE.plan.organizationType, USAGE.plan.rateLimitTier].filter(Boolean).join(' · '));
  }
  const w = USAGE.windows.current;
  if (w) row(L.window + ' (' + hm(w.startedAt) + '–' + hm(w.endsAt) + ')', fmtBucket(w), w.billed, b5);
  else row(L.window, L.noWindow);
  row(L.today, fmtBucket(USAGE.today));
  row(L.week + ' · ' + L.windows(USAGE.windows.count7d), fmtBucket(USAGE.week), USAGE.week.billed, bw);

  // budget inputs (client-side; stored in localStorage, override env defaults)
  const brow = add(body, 'div', 'urow');
  for (const [label, key] of [[L.b5, 'b5M'], [L.bw, 'bwM']]) {
    add(brow, 'span', 'ulabel', label + ' (' + L.m + ')').style.minWidth = 'auto';
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.min = '0';
    inp.step = '1';
    inp.value = localStorage.getItem('agentfdr.' + key) ?? '';
    inp.addEventListener('change', () => {
      localStorage.setItem('agentfdr.' + key, inp.value);
      renderUsage();
    });
    brow.appendChild(inp);
  }

  // daily bars (billed tokens, oldest -> newest)
  const days = USAGE.days;
  const bw_ = 18, gap = 4, chartH = 56, labelH = 14, padL = 4;
  const width = padL + days.length * (bw_ + gap);
  const maxB = Math.max(1, ...days.map((d) => d.billed));
  const svg = mk('svg', { width, height: chartH + labelH, viewBox: `0 0 ${width} ${chartH + labelH}` });
  svg.style.display = 'block';
  svg.style.marginTop = '8px';
  days.forEach((d, i) => {
    const h = Math.max(1, (d.billed / maxB) * (chartH - 2));
    const r = mk('rect', { x: padL + i * (bw_ + gap), y: chartH - h, width: bw_, height: h, rx: 2, fill: css('--ctx-2') });
    const tip = mk('title', {});
    tip.textContent = d.date + ' — ' + fmtBucket(d);
    r.appendChild(tip);
    svg.appendChild(r);
    if (i === 0 || i === days.length - 1 || i % 7 === 0) {
      const lbl = mk('text', { x: padL + i * (bw_ + gap) + bw_ / 2, y: chartH + 11, 'text-anchor': 'middle', fill: css('--text-muted'), 'font-size': 9 });
      lbl.textContent = d.date.slice(5);
      svg.appendChild(lbl);
    }
  });
  body.appendChild(svg);

  // per-model
  const mrow = add(body, 'div', 'urow');
  add(mrow, 'span', 'ulabel', L.byModel);
  add(mrow, 'span', '', USAGE.models.map((m) => `${m.model} ${L.turns(m.turns)} · ${kM(m.billed)} tok · ${m.unpriced ? '~$?' : '~' + fmtUsd(m.usd)}`).join('  |  '));

  if (USAGE.unknownModels && USAGE.unknownModels.length) {
    add(body, 'div', 'unote', L.unknown(USAGE.unknownModels.join(', ')));
  }
  add(body, 'div', 'unote', L.calib);
}

// ---------- session comparison (failed attempt vs successful retry) ----------
function renderDiffPicker() {
  const sel = $('diffSelect');
  const current = $('sessionSelect').value;
  const prev = sel.value;
  sel.textContent = '';
  const ph = document.createElement('option');
  ph.value = '';
  ph.textContent = T().d.choose;
  sel.appendChild(ph);
  for (const s of SESSIONLIST) {
    if (s.id === current) continue;
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = (s.title || s.id.slice(0, 8)) + ' — ' + new Date(s.mtimeMs).toLocaleString();
    sel.appendChild(opt);
  }
  if (prev && [...sel.options].some((o) => o.value === prev)) sel.value = prev;
  if (sel.value) loadDiff();
  else if (DIFF) renderDiff();
  else $('diffBody').textContent = '';
}

async function loadDiff() {
  const a = $('sessionSelect').value;
  const b = $('diffSelect').value;
  if (!a || !b) return;
  $('diffBody').textContent = '…';
  try {
    const res = await fetch('/api/diff?a=' + encodeURIComponent(a) + '&b=' + encodeURIComponent(b));
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'HTTP ' + res.status);
    DIFF = data;
  } catch (err) {
    $('diffBody').textContent = T().d.loadError(err.message || String(err));
    return;
  }
  renderDiff();
}

function renderDiff() {
  const L = T().d;
  const body = $('diffBody');
  body.textContent = '';
  if (!DIFF) return;
  const name = (s) => s.title || (s.id ?? '?').slice(0, 8);
  add(body, 'div', 'upct', 'A: ' + name(DIFF.a) + '    |    B: ' + name(DIFF.b));

  const mkTable = (head) => {
    const table = document.createElement('table');
    const thr = document.createElement('tr');
    head.forEach((h, i) => {
      const th = document.createElement('th');
      if (i > 0) th.className = 'num';
      th.textContent = h;
      thr.appendChild(th);
    });
    table.appendChild(thr);
    return table;
  };
  // judge: for lower-is-better metrics, color B green when it improved on A
  const row3 = (table, label, aVal, bVal, fmt, judge) => {
    const tr = document.createElement('tr');
    add(tr, 'td', '', label);
    const tdA = add(tr, 'td', 'num', fmt(aVal));
    const tdB = add(tr, 'td', 'num', fmt(bVal));
    if (judge && aVal != null && bVal != null && aVal !== bVal) {
      tdB.classList.add(bVal < aVal ? 'better' : 'worse');
    }
    table.appendChild(tr);
    return tr;
  };
  const S = String;
  const usd = (v) => (v == null ? '?' : '~' + fmtUsd(v));

  const stats = mkTable([L.metric, 'A', 'B']);
  const A = DIFF.a.stats, B = DIFF.b.stats;
  row3(stats, L.turns, A.turns, B.turns, S, false);
  row3(stats, L.prompts, A.prompts, B.prompts, S, false);
  row3(stats, L.calls, A.toolCalls, B.toolCalls, S, false);
  row3(stats, L.errors, A.toolErrors, B.toolErrors, S, true);
  row3(stats, L.wall, A.wallMs, B.wallMs, fmtMs, true);
  row3(stats, L.out, A.outputTokens, B.outputTokens, kTok, false);
  row3(stats, L.billed, A.billedTokens, B.billedTokens, kTok, true);
  row3(stats, L.peak, A.contextPeak, B.contextPeak, kTok, false);
  row3(stats, L.cost, A.estUsd, B.estUsd, usd, true);
  row3(stats, L.anomalies, A.anomalies, B.anomalies, S, true);
  row3(stats, L.critical, A.critical, B.critical, S, true);
  body.appendChild(stats);

  if (DIFF.flags.length) {
    add(body, 'h3', '', L.flagsH);
    const ft = mkTable(['', 'A', 'B']);
    for (const f of DIFF.flags) row3(ft, f.type, f.a, f.b, S, true);
    body.appendChild(ft);
  }

  add(body, 'h3', '', L.toolsH);
  const tt = mkTable(['', 'A', 'B']);
  for (const tl of DIFF.tools) row3(tt, tl.name, tl.a, tl.b, S, false);
  body.appendChild(tt);

  const fileBlock = (label, arr, extra) => {
    if (!arr.length) return;
    add(body, 'h3', '', L.filesH + ' — ' + label);
    for (const f of arr) add(body, 'div', 'fpath', f);
    if (extra) add(body, 'div', 'upct', L.more(extra));
  };
  fileBlock(L.both, DIFF.files.both, DIFF.files.truncated.both);
  fileBlock(L.onlyA, DIFF.files.onlyA, DIFF.files.truncated.onlyA);
  fileBlock(L.onlyB, DIFF.files.onlyB, DIFF.files.truncated.onlyB);
}

async function copyReport() {
  const id = $('sessionSelect').value;
  if (!id) return;
  const btn = $('copyReport');
  try {
    const res = await fetch('/api/blame?id=' + encodeURIComponent(id) + '&lang=' + LANG);
    if (!res.ok) throw new Error('HTTP ' + res.status); // never copy an error body as "success"
    await navigator.clipboard.writeText(await res.text());
    btn.textContent = T().copied;
  } catch {
    btn.textContent = '✗';
  }
  setTimeout(() => { btn.textContent = T().copyReport; }, 1500);
}

async function load(id) {
  location.hash = id;
  $('errbar').classList.add('hidden');
  try {
    const res = await fetch('/api/session?id=' + encodeURIComponent(id));
    const data = await res.json();

/** Grafana-style stat sparkline: a low-opacity area chart hugging the tile bottom. */
function sparkline(values, color) {
  if (!values || values.length < 2) return null;
  const w = 200, h = 26;
  const max = Math.max(...values, 1);
  const step = w / (values.length - 1);
  let line = '';
  values.forEach((v, i) => {
    const x = (i * step).toFixed(1);
    const y = (h - 1 - (v / max) * (h - 3)).toFixed(1);
    line += (i ? 'L' : 'M') + x + ' ' + y;
  });
  const svg = mk('svg', { viewBox: `0 0 ${w} ${h}`, preserveAspectRatio: 'none', 'aria-hidden': 'true' });
  svg.setAttribute('class', 'spark');
  svg.appendChild(mk('path', { d: line + `L${w} ${h}L0 ${h}Z`, fill: color, opacity: 0.16 }));
  svg.appendChild(mk('path', { d: line, fill: 'none', stroke: color, 'stroke-width': 1.4, opacity: 0.7 }));
  return svg;
}

function renderTiles() {
  const t = MODEL.totals;
  const flags = MODEL.flags;
  const L = T();
  const turns = MODEL.turns;
  const crit = flags.filter((f) => f.severity === 'critical').length;
  const peak = Math.max(0, ...turns.map((tt) => tt.contextTokens));

  // Cache efficiency: how much of the prompt was served from cache.
  const cacheDenom = t.tokens.input + t.tokens.cacheRead + t.tokens.cacheCreation;
  const hitRate = cacheDenom > 0 ? t.tokens.cacheRead / cacheDenom : null;
  const hitClass = hitRate == null ? '' : hitRate >= 0.8 ? 'ok' : hitRate >= 0.5 ? 'warn' : 'crit';
  const hitColor = hitRate == null ? '--text-muted' : hitRate >= 0.8 ? '--out' : hitRate >= 0.5 ? '--status-warning' : '--status-critical';

  // Cumulative billed tokens: the cost curve's shape without client-side pricing.
  let acc = 0;
  const billedCum = turns.map((tt) => (acc += tt.usage.input + tt.usage.cacheCreation + tt.usage.output));

  const tiles = [
    { label: L.tiles.turns, value: String(t.turns), sub: L.subs.prompts(MODEL.prompts.length) },
    {
      label: L.tiles.calls, value: String(t.toolCalls),
      valueClass: t.toolErrors > 0 ? 'warn' : '',
      sub: t.toolErrors ? L.subs.errors(t.toolErrors) : L.subs.noErrors, subBad: t.toolErrors > 0,
      spark: { values: turns.map((tt) => tt.toolCalls.length), color: css('--tool-shell') },
    },
    {
      label: L.tiles.out, value: kTok(t.tokens.output),
      sub: L.subs.fresh(kTok(t.tokens.input + t.tokens.cacheCreation)),
      spark: { values: turns.map((tt) => tt.usage.output), color: css('--out') },
    },
    {
      label: L.tiles.peak, value: kTok(peak),
      sub: L.subs.cacheTotal(kTok(t.tokens.cacheRead)),
      spark: { values: turns.map((tt) => tt.contextTokens), color: css('--ctx-2') },
    },
    {
      label: L.tiles.cache, value: hitRate == null ? '—' : Math.round(hitRate * 100) + '%',
      valueClass: hitClass,
      sub: L.subs.cacheIo(kTok(t.tokens.cacheRead), kTok(t.tokens.cacheCreation)),
      gauge: hitRate == null ? null : { pct: hitRate * 100, color: css(hitColor) },
    },
  ];
  if (MODEL.cost && MODEL.cost.usd != null) {
    tiles.push({
      label: L.tiles.cost, value: '~' + fmtUsd(MODEL.cost.usd),
      sub: MODEL.cost.unknownModels?.length ? L.subs.partialEstimate : L.subs.estimate,
      spark: { values: billedCum, color: css('--tool-mcp') },
    });
  }
  tiles.push({
    label: L.tiles.flags, value: String(flags.length),
    valueClass: crit > 0 ? 'crit' : flags.length > 0 ? 'warn' : 'ok',
    sub: crit ? L.subs.critical(crit) : L.subs.noneCritical, subBad: crit > 0,
  });

  const wrap = $('tiles');
  wrap.textContent = '';
  for (const tl of tiles) {
    const d = document.createElement('div');
    d.className = 'tile';
    add(d, 'div', 'label', tl.label);
    add(d, 'div', 'value' + (tl.valueClass ? ' ' + tl.valueClass : ''), tl.value);
    add(d, 'div', 'sub' + (tl.subBad ? ' bad' : ''), tl.sub);
    if (tl.gauge) {
      const g = add(d, 'div', 'gauge');
      const fill = add(g, 'div', '');
      fill.style.width = Math.min(100, tl.gauge.pct) + '%';
      fill.style.background = tl.gauge.color;
    }
    if (tl.spark) {
      const s = sparkline(tl.spark.values, tl.spark.color);
      if (s) d.appendChild(s);
    }
    wrap.appendChild(d);
  }
}

function renderFlags() {

// The timeline: shared x (turn index), stacked lanes. SVG, no libraries.
function renderTimeline() {
  const turns = MODEL.turns;
  const lanes = $('lanes');
  const L = T();
  lanes.textContent = '';
  if (!turns.length) return;

  const n = turns.length;
  const colW = Math.max(7, Math.min(26, Math.floor(1200 / n)));
  const barW = Math.min(24, colW - 2); // ≤24px thick, 2px surface gap between columns
  const padL = 46, padR = 12;
  const width = padL + n * colW + padR;

  const maxTools = Math.min(8, Math.max(1, ...turns.map((t) => t.toolCalls.length)));
  const toolsH = maxTools * 10 + 4;
  const ctxH = 80, outH = 40, marksH = 18, axisH = 20, gap = 9, header = 13;
  const yTools = marksH + header, yCtx = yTools + toolsH + gap + header, yOut = yCtx + ctxH + gap + header, yAxis = yOut + outH + 8;
  const height = yAxis + axisH;

  const svg = mk('svg', { width, height, viewBox: `0 0 ${width} ${height}`, role: 'img' });
  svg.style.display = 'block';
  const x = (i) => padL + i * colW;
  TL = { x, barW, colW, yAxis, n };

  // lane labels sit in their own header row, clear of the tick gutter
  laneLabel(svg, L.lanes.tools, padL, yTools - 4);
  laneLabel(svg, L.lanes.ctx, padL, yCtx - 4);
  laneLabel(svg, L.lanes.out, padL, yOut - 4);

  // selection overlays (kept behind the marks, moved without re-rendering)
  const selRange = mk('rect', { x: -9999, y: 0, width: 0, height: yAxis, fill: css('--select'), rx: 3 });
  selRange.id = 'selrange';
  svg.appendChild(selRange);
  const selRect = mk('rect', { x: -9999, y: 0, width: colW, height: yAxis, fill: 'none', stroke: css('--ctx-2'), 'stroke-width': 1.5, rx: 3 });
  selRect.id = 'selrect';
  svg.appendChild(selRect);

  // --- markers lane: compaction + prompts ---
  for (const m of MODEL.metaEvents) {
    if (m.kind !== 'compaction') continue;
    const i = Math.max(0, Math.min(n - 1, (m.afterTurn ?? 0) + 1));
    svg.appendChild(mk('line', { x1: x(i) - 1, y1: marksH - 6, x2: x(i) - 1, y2: yAxis, stroke: css('--baseline'), 'stroke-width': 1 }));
    const t = mk('text', { x: x(i) + 2, y: 12, fill: css('--text-muted'), 'font-size': 10 });
    t.textContent = L.compact;
    svg.appendChild(t);
  }
  for (const p of MODEL.prompts) {
    const i = Math.max(0, Math.min(n - 1, (p.afterTurn ?? -1) + 1));
    const t = mk('text', { x: x(i) + barW / 2, y: 12, fill: css('--text-secondary'), 'font-size': 10, 'text-anchor': 'middle' });
    t.textContent = '▼';
    t.style.cursor = 'pointer';
    t.addEventListener('click', () => { selectedTurn = i; renderDetail(); updateSelection(); });
    const tip = mk('title', {});
    tip.textContent = p.text.slice(0, 200);
    t.appendChild(tip);
    svg.appendChild(t);
  }

  // --- scales for token lanes ---
  const maxCtx = Math.max(1, ...turns.map((t) => t.contextTokens));
  const maxOut = Math.max(1, ...turns.map((t) => t.usage.output));

  // gridlines + clean ticks (recessive, hairline)
  for (const [laneY, laneH, maxV] of [[yCtx, ctxH, maxCtx], [yOut, outH, maxOut]]) {
    for (const v of niceTicks(maxV)) {
      const gy = laneY + laneH - (v / maxV) * (laneH - 4);
      svg.appendChild(mk('line', { x1: padL - 4, y1: gy, x2: width - padR, y2: gy, stroke: v === 0 ? css('--baseline') : css('--grid'), 'stroke-width': 1 }));
      const lbl = mk('text', { x: padL - 8, y: gy + 3.5, 'text-anchor': 'end', fill: css('--text-muted'), 'font-size': 10, style: 'font-variant-numeric: tabular-nums' });
      lbl.textContent = kTok(v);
      svg.appendChild(lbl);
    }
  }

  // --- per-turn marks ---
  const ctxColors = [css('--ctx-1'), css('--ctx-2'), css('--ctx-3')];
  for (let i = 0; i < n; i++) {
    const t = turns[i];
    const gx = x(i);
    const dim = t.isSidechain ? 0.55 : 1;

    // tool blocks (top-down stack, 2px surface gaps)
    t.toolCalls.slice(0, maxTools).forEach((c, j) => {
      const g = toolGroup(c.name);
      const fdim = TOOLFILTER.size && !TOOLFILTER.has(g) ? 0.12 : 1;
      const r = mk('rect', {
        x: gx, y: yTools + 4 + j * 10, width: barW, height: 8, rx: 2,
        fill: groupColor(g), opacity: dim * fdim,
      });
      if (c.result && c.result.isError) {
        r.setAttribute('stroke', css('--status-critical'));
        r.setAttribute('stroke-width', '2');
      }
      svg.appendChild(r);
    });
    if (t.toolCalls.length > maxTools) {
      const more = mk('text', { x: gx + barW / 2, y: yTools + 4 + maxTools * 10 + 8, 'text-anchor': 'middle', fill: css('--text-muted'), 'font-size': 9 });
      more.textContent = '+' + (t.toolCalls.length - maxTools);
      svg.appendChild(more);
    }

    // context stacked bar: cacheRead -> cacheCreation -> fresh input (light -> dark)
    const segs = [t.usage.cacheRead, t.usage.cacheCreation, t.usage.input];
    let yCursor = yCtx + ctxH;
    segs.forEach((v, si) => {
      if (v <= 0) return;
      const h = Math.max(1, (v / maxCtx) * (ctxH - 4));
      yCursor -= h;
      svg.appendChild(mk('rect', { x: gx, y: yCursor, width: barW, height: Math.max(0, h - 2), rx: 2, fill: ctxColors[si], opacity: dim }));
    });

    // output bar (single series, rounded data-end, square baseline)
    if (t.usage.output > 0) {
      const h = Math.max(1.5, (t.usage.output / maxOut) * (outH - 4));
      svg.appendChild(mk('rect', { x: gx, y: yOut + outH - h, width: barW, height: h, rx: 2, fill: css('--out'), opacity: dim }));
    }

    // flag underline on axis — only tightly-scoped flags; ambient ranges
    // (file-churn spans first-to-last edit) would paint the whole axis
    const tflags = flagsAt(i).filter((f) => f.turnEnd - f.turnStart <= 40 && f.type !== 'file-churn');
    if (tflags.length) {
      const worst = tflags.some((f) => f.severity === 'critical') ? '--status-critical' : '--status-warning';
      svg.appendChild(mk('rect', { x: gx, y: yAxis - 4, width: barW, height: 3, rx: 1.5, fill: css(worst) }));
    }

    // x tick labels
    if (i % Math.ceil(n / 14) === 0) {
      const lbl = mk('text', { x: gx + barW / 2, y: yAxis + 14, 'text-anchor': 'middle', fill: css('--text-muted'), 'font-size': 10, style: 'font-variant-numeric: tabular-nums' });
      lbl.textContent = String(i);
      svg.appendChild(lbl);
    }

    // hover/click hit target — bigger than the marks, full column
    const hit = mk('rect', { x: gx - 1, y: 0, width: colW, height: yAxis, fill: 'transparent' });
    hit.style.cursor = 'pointer';
    hit.dataset.turn = String(i);
    hit.addEventListener('pointerenter', (e) => { hit.setAttribute('fill', css('--wash')); showTooltip(e, i); });
    hit.addEventListener('pointermove', (e) => showTooltip(e, i));
    hit.addEventListener('pointerleave', () => { hit.setAttribute('fill', 'transparent'); hideTooltip(); });
    hit.addEventListener('click', () => { selectedTurn = i; renderDetail(); updateSelection(); });
    svg.appendChild(hit);
  }

  lanes.appendChild(svg);
  $('tlTitle').textContent = L.timeline(n);
  renderLegend();
}

/** Move the selection overlays without rebuilding the SVG. */
function updateSelection(rangeFlag = null) {
  if (!TL) return;
  const selRect = document.getElementById('selrect');
  const selRange = document.getElementById('selrange');
  if (!selRect || !selRange) return;
  if (selectedTurn == null) {
    selRect.setAttribute('x', -9999);
  } else {
    selRect.setAttribute('x', TL.x(selectedTurn) - 1);
  }
  if (rangeFlag && rangeFlag.turnEnd > rangeFlag.turnStart) {
    selRange.setAttribute('x', TL.x(rangeFlag.turnStart) - 1);
    selRange.setAttribute('width', TL.x(rangeFlag.turnEnd) - TL.x(rangeFlag.turnStart) + TL.colW);
  } else {
    selRange.setAttribute('x', -9999);
    selRange.setAttribute('width', 0);
  }
}

function laneLabel(svg, text, x, y) {
  const t = mk('text', { x, y, fill: css('--text-muted'), 'font-size': 10, 'letter-spacing': '0.06em' });
  t.textContent = text;
  svg.appendChild(t);
}

/** 0..max as 2–3 clean ticks (1/2/2.5/5 × 10^k). */
function niceTicks(max) {
  if (max <= 0) return [0];
  const raw = max / 2;
  const pow = Math.pow(10, Math.floor(Math.log10(raw)));
  const step = [1, 2, 2.5, 5, 10].map((m) => m * pow).find((s) => s >= raw) ?? raw;
  const out = [0];
  for (let v = step; v <= max; v += step) out.push(Math.round(v));
  return out;
}

function renderLegend() {
  const legend = $('legend');
  const L = T();
  legend.textContent = '';
  // Two rows: tool identities and token segments never share a line.
  // Tool keys are buttons: clicking filters the tools lane to those groups.
  const toolsRow = document.createElement('div');
  toolsRow.className = 'legend';
  const present = new Set();
  for (const t of MODEL.turns) for (const c of t.toolCalls) present.add(toolGroup(c.name));
  const order = [...TOOL_GROUPS.map(([g]) => g), 'other'].filter((g) => present.has(g));
  groupTitle(toolsRow, L.legendGroups.tools);
  for (const g of order) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'key' +
      (TOOLFILTER.has(g) ? ' active' : '') +
      (TOOLFILTER.size && !TOOLFILTER.has(g) ? ' dimmed' : '');
    const sw = document.createElement('span');
    sw.className = 'swatch';
    sw.style.background = groupColor(g);
    btn.appendChild(sw);
    btn.appendChild(document.createTextNode(L.toolGroups[g]));
    btn.addEventListener('click', () => {
      if (TOOLFILTER.has(g)) TOOLFILTER.delete(g);
      else TOOLFILTER.add(g);
      renderTimeline();
      updateSelection();
    });
    toolsRow.appendChild(btn);
  }
  add(toolsRow, 'span', 'hint', L.legendHint);
  legend.appendChild(toolsRow);

  const tokRow = document.createElement('div');
  tokRow.className = 'legend';
  groupTitle(tokRow, L.legendGroups.tokens);
  key(tokRow, css('--ctx-1'), L.tokenKeys.cacheRead);
  key(tokRow, css('--ctx-2'), L.tokenKeys.cacheWrite);
  key(tokRow, css('--ctx-3'), L.tokenKeys.fresh);
  key(tokRow, css('--out'), L.tokenKeys.out);
  legend.appendChild(tokRow);
}
function groupTitle(row, text) {
  const s = document.createElement('span');
  s.textContent = text;
  s.style.cssText = 'color:var(--text-muted);font-size:10px;letter-spacing:0.06em;min-width:44px';
  row.appendChild(s);
}
function key(parent, color, label) {
  const k = document.createElement('span');
  k.className = 'key';
  const sw = document.createElement('span');
  sw.className = 'swatch';
  sw.style.background = color;
  k.appendChild(sw);
  k.appendChild(document.createTextNode(label));
  parent.appendChild(k);
}

function flagsAt(i) {
  return MODEL.flags.filter((f) => i >= f.turnStart && i <= f.turnEnd);
}
function promptBefore(i) {
  return MODEL.prompts.find((p) => (p.afterTurn ?? -1) + 1 === i);
}

// ---------- tooltip (values lead, labels follow; line keys) ----------
function showTooltip(e, i) {
  const t = MODEL.turns[i];
  const L = T();
  const tt = $('tooltip');
  tt.textContent = '';
  const multiModel = MODEL.session.models && MODEL.session.models.length > 1;
  add(tt, 'div', 'tt-title', L.tt.turn(i)
    + (t.isSidechain ? ' · ' + L.tt.subagent : '')
    + (multiModel && t.model ? ' · ' + t.model.replace(/^claude-/, '') : '')
    + (t.speed === 'fast' ? ' · ⚡fast' : '')
    + (t.timestamp ? ' · ' + hhmm(t.timestamp) : ''));

  row(tt, css('--ctx-2'), kTok(t.contextTokens), L.tt.context(kTok(t.usage.cacheRead)));
  row(tt, css('--out'), kTok(t.usage.output), L.tt.outTokens);
  for (const c of t.toolCalls.slice(0, 6)) {
    row(tt, groupColor(toolGroup(c.name)), c.name, (c.summary || '') + (c.result && c.result.isError ? '  ' + L.tt.error : ''));
  }
  if (t.toolCalls.length > 6) add(tt, 'div', 'l', L.tt.more(t.toolCalls.length - 6));
  if (t.stopReason) add(tt, 'div', 'l', L.tt.stop(t.stopReason));
  const p = promptBefore(i);
  if (p) add(tt, 'div', 'prompt', L.tt.prompt + p.text.slice(0, 120));
  for (const f of flagsAt(i)) add(tt, 'div', 'flagline ' + f.severity, (f.severity === 'critical' ? '● ' : '▲ ') + flagTitle(f));

  tt.style.display = 'block';
  const pad = 14;
  const w = tt.offsetWidth, h = tt.offsetHeight;
  let px = e.clientX + pad, py = e.clientY + pad;
  if (px + w > innerWidth - 8) px = e.clientX - w - pad;
  if (py + h > innerHeight - 8) py = e.clientY - h - pad;
  tt.style.left = px + 'px';
  tt.style.top = py + 'px';
}
function hideTooltip() { $('tooltip').style.display = 'none'; }
function row(tt, color, value, label) {
  const r = document.createElement('div');
  r.className = 'row';
  const k = document.createElement('span');
  k.className = 'k';
  k.style.background = color;
  r.appendChild(k);
  const v = document.createElement('span');
  v.className = 'v';
  v.textContent = value;
  r.appendChild(v);
  const l = document.createElement('span');
  l.className = 'l';
  l.textContent = label;
  r.appendChild(l);
  tt.appendChild(r);
}

// ---------- prompts card (the session's structure at a glance) ----------
function renderPrompts() {
  const list = $('promptsList');
  $('promptsTitle').textContent = T().promptsTitle(MODEL.prompts.length);
  list.textContent = '';
  for (const p of MODEL.prompts) {
    const li = document.createElement('li');
    const turn = Math.max(0, Math.min(MODEL.turns.length - 1, (p.afterTurn ?? -1) + 1));
    const btn = document.createElement('button');
    btn.textContent = 't' + turn + (p.timestamp ? ' · ' + hhmm(p.timestamp) : '');
    btn.addEventListener('click', () => {
      switchTab('timeline'); // jumping to a turn only makes sense on the timeline
      selectedTurn = turn;
      renderDetail();
      updateSelection();
      scrollToTurn(turn);
    });
    li.appendChild(btn);
    if (p.queued) add(li, 'span', 'pqueued', T().queuedBadge);
    add(li, 'span', 'ptext', p.text.length > 300 ? p.text.slice(0, 300) + '…' : p.text);
    list.appendChild(li);
  }
}

// ---------- table view (the no-hover, no-color path to every value) ----------
function renderTable() {
  const table = $('turnsTable');
  const L = T();
  table.textContent = '';
  const thead = document.createElement('tr');
  L.tableCols.forEach((h, ci) => {
    const th = document.createElement('th');
    if ([0, 3, 4, 5].includes(ci)) th.className = 'num';
    th.textContent = h;
    thead.appendChild(th);
  });
  table.appendChild(thead);
  for (const t of MODEL.turns) {
    const tr = document.createElement('tr');
    const cells = [
      [String(t.index) + (t.isSidechain ? ' ⧉' : ''), 1],
      [hhmm(t.timestamp), 0],
      [t.toolCalls.map((c) => c.name).join(', '), 0],
      [kTok(t.contextTokens), 1],
      [kTok(t.usage.output), 1],
      [String(t.toolCalls.filter((c) => c.result && c.result.isError).length || ''), 1],
      [flagsAt(t.index).map((f) => flagTitle(f)).join('; '), 0],
    ];
    for (const [v, num] of cells) {
      const td = document.createElement('td');
      if (num) td.className = 'num';
      td.textContent = v;
      tr.appendChild(td);
    }
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', () => { selectedTurn = t.index; renderDetail(); updateSelection(); });
    table.appendChild(tr);
  }
}

// ---------- turn detail ----------
function renderDetail() {
  const panel = $('detail');
  const card = $('detailBody');
  const L = T();
  if (selectedTurn == null || !MODEL.turns[selectedTurn]) {
    panel.classList.remove('open'); // narrow screens: slide away; wide: stays with empty state
    card.textContent = '';
    add(card, 'div', 'dempty', L.detail.empty);
    return;
  }
  const t = MODEL.turns[selectedTurn];
  panel.classList.add('open');
  card.textContent = '';

  const head = add(card, 'div', 'head');
  add(head, 'span', 't', L.detail.turn(t.index));
  add(head, 'span', 'm', [t.timestamp && new Date(t.timestamp).toLocaleTimeString(), t.model, t.speed === 'fast' && '⚡fast', t.stopReason && L.detail.stop(t.stopReason), t.isSidechain && L.detail.subagent].filter(Boolean).join(' · '));
  const spacer = add(head, 'span', '');
  spacer.style.flex = '1';
  navBtn(head, L.detail.prev, () => step(-1), selectedTurn > 0);
  navBtn(head, L.detail.next, () => step(1), selectedTurn < MODEL.turns.length - 1);
  navBtn(head, L.detail.close, () => { selectedTurn = null; renderDetail(); updateSelection(); }, true);

  const usage = add(card, 'div', '');
  usage.style.cssText = 'display:flex;gap:18px;flex-wrap:wrap;font-size:12.5px;color:var(--text-secondary);margin-bottom:4px';
  const U = L.detail.usage;
  for (const [l, v] of [[U.input, t.usage.input], [U.cacheRead, t.usage.cacheRead], [U.cacheWrite, t.usage.cacheCreation], [U.out, t.usage.output], [U.thinking, t.thinkingChars]]) {
    const s = document.createElement('span');
    const b = document.createElement('strong');
    b.textContent = kTok(v);
    b.style.color = 'var(--text-primary)';
    s.appendChild(b);
    s.appendChild(document.createTextNode(' ' + l));
    usage.appendChild(s);
  }

  if (t.text) add(card, 'div', 'atext', t.text.length > 4000 ? t.text.slice(0, 4000) + '…' : t.text);

  if (t.toolCalls.length) {
    const table = document.createElement('table');
    const thr = document.createElement('tr');
    for (const h of L.detail.cols) {
      const th = document.createElement('th');
      th.textContent = h;
      thr.appendChild(th);
    }
    table.appendChild(thr);
    for (const c of t.toolCalls) {
      const tr = document.createElement('tr');
      const tdName = document.createElement('td');
      const swatch = document.createElement('span');
      swatch.className = 'toolkey';
      swatch.style.background = groupColor(toolGroup(c.name));
      tdName.appendChild(swatch);
      tdName.appendChild(document.createTextNode(c.name));
      tr.appendChild(tdName);
      const tdIn = document.createElement('td');
      tdIn.textContent = c.summary || '';
      tr.appendChild(tdIn);
      const tdDur = document.createElement('td');
      tdDur.textContent = c.result && c.result.durationMs != null ? fmtMs(c.result.durationMs) : '';
      tr.appendChild(tdDur);
      const tdRes = document.createElement('td');
      if (c.result) {
        if (c.result.isError) {
          const e = document.createElement('span');
          e.className = 'err';
          e.textContent = L.detail.error;
          tdRes.appendChild(e);
        }
        tdRes.appendChild(document.createTextNode(kTok(c.result.chars) + ' ' + L.detail.chars));
        if (c.result.snippet) {
          const det = document.createElement('details');
          const sum = document.createElement('summary');
          sum.textContent = L.detail.snippet;
          det.appendChild(sum);
          const pre = document.createElement('pre');
          pre.textContent = c.result.snippet;
          det.appendChild(pre);
          tdRes.appendChild(det);
        }
      } else {
        tdRes.textContent = L.detail.noResult;
      }
      tr.appendChild(tdRes);
      table.appendChild(tr);
    }
    card.appendChild(table);
  }
}

function navBtn(parent, label, onClick, enabled) {
  const b = document.createElement('button');
  b.textContent = label;
  b.disabled = !enabled;
  if (!enabled) b.style.opacity = '0.4';
  b.addEventListener('click', onClick);
  parent.appendChild(b);
}
function step(delta) {
  const max = MODEL.turns.length - 1;
  selectedTurn = Math.max(0, Math.min(max, (selectedTurn ?? 0) + delta));
  renderDetail();
  updateSelection();
  scrollToTurn(selectedTurn);
}

function scrollToTurn(i) {
  const hit = document.querySelector(`[data-turn="${i}"]`);
  if (hit) hit.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ---------- tiny DOM/SVG helpers ----------
function add(parent, tag, cls, text) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (text != null) el.textContent = text;
  parent.appendChild(el);
  return el;
}
function mk(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}
</script>
</body>
