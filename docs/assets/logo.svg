<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Real flight data recorders are orange. -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="#f4511e"/>
  <!-- recorder screen -->
  <rect x="38" y="38" width="180" height="180" rx="24" fill="#141413"/>
  <!-- tools lane -->
  <g>
    <rect x="58"  y="62" width="15" height="15" rx="4" fill="#3987e5"/>
    <rect x="79"  y="62" width="15" height="15" rx="4" fill="#199e70"/>
    <rect x="100" y="62" width="15" height="15" rx="4" fill="#c98500"/>
    <rect x="121" y="62" width="15" height="15" rx="4" fill="#199e70"/>
    <rect x="142" y="62" width="15" height="15" rx="4" fill="#d95926"/>
    <rect x="163" y="62" width="15" height="15" rx="4" fill="#3987e5"/>
    <rect x="184" y="62" width="15" height="15" rx="4" fill="#199e70"/>
  </g>
  <!-- context lane: the climb -->
  <g fill="#86b6ef">
    <rect x="58"  y="150" width="15" height="22" rx="4"/>
    <rect x="79"  y="140" width="15" height="32" rx="4"/>
    <rect x="100" y="129" width="15" height="43" rx="4"/>
    <rect x="121" y="118" width="15" height="54" rx="4"/>
    <rect x="142" y="107" width="15" height="65" rx="4"/>
    <rect x="163" y="98"  width="15" height="74" rx="4"/>
    <rect x="184" y="90"  width="15" height="82" rx="4" fill="#3987e5"/>
  </g>
  <!-- output lane -->
  <g fill="#199e70">
    <rect x="58"  y="188" width="15" height="10" rx="4"/>
    <rect x="79"  y="184" width="15" height="14" rx="4"/>
    <rect x="100" y="190" width="15" height="8"  rx="4"/>
    <rect x="121" y="182" width="15" height="16" rx="4"/>
    <rect x="142" y="186" width="15" height="12" rx="4"/>
    <rect x="163" y="180" width="15" height="18" rx="4"/>
    <rect x="184" y="188" width="15" height="10" rx="4"/>
  </g>
</svg>
